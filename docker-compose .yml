version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trading-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - bot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d trading_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Trading Bot Backend ──────────────────────────────────────────────
  trading-bot:
    build: .
    container_name: crypto-trading-bot
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Binance
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      # Encryption
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Trading
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-70}
      - DAILY_MAX_TRADES=${DAILY_MAX_TRADES:-100}
      - HOURLY_MAX_TRADES=${HOURLY_MAX_TRADES:-10}
      - COIN_COOLDOWN_MINUTES=${COIN_COOLDOWN_MINUTES:-30}
      - MAX_VOLATILITY_PCT=${MAX_VOLATILITY_PCT:-5.0}
      - DAILY_PROFIT_LIMIT_PCT=${DAILY_PROFIT_LIMIT_PCT:-150.0}
      - DAILY_LOSS_LIMIT_PCT=${DAILY_LOSS_LIMIT_PCT:-20.0}
      - LOSS_COOLDOWN_COUNT=${LOSS_COOLDOWN_COUNT:-3}
      - LOSS_COOLDOWN_MINUTES=${LOSS_COOLDOWN_MINUTES:-15}
      - DRAWDOWN_PAUSE_PCT=${DRAWDOWN_PAUSE_PCT:--10.0}
      - MAX_COIN_REPEATS_PER_HOUR=${MAX_COIN_REPEATS_PER_HOUR:-2}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bot-network
    depends_on:
      postgres:
        condition: service_healthy

  # ── n8n Workflow Automation ──────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://89.116.28.83:5678/
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - bot-network
    depends_on:
      - trading-bot

volumes:
  postgres_data:
  n8n_data:

networks:
  bot-network:
    driver: bridge
