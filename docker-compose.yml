version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: trading-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - bot-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U botuser -d trading_bot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Main Trading Bot (signal engine + trade entry) ───────────────────
  trading-bot:
    build: .
    container_name: crypto-trading-bot
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Binance
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      # Encryption
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Admin + Auth
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-480}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Trading
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-70}
      - DAILY_MAX_TRADES=${DAILY_MAX_TRADES:-150}
      - HOURLY_MAX_TRADES=${HOURLY_MAX_TRADES:-10}
      - COIN_COOLDOWN_MINUTES=${COIN_COOLDOWN_MINUTES:-30}
      - MAX_VOLATILITY_PCT=${MAX_VOLATILITY_PCT:-5.0}
      - DAILY_PROFIT_LIMIT_PCT=${DAILY_PROFIT_LIMIT_PCT:-150.0}
      - DAILY_LOSS_LIMIT_PCT=${DAILY_LOSS_LIMIT_PCT:-20.0}
      - LOSS_COOLDOWN_COUNT=${LOSS_COOLDOWN_COUNT:-3}
      - LOSS_COOLDOWN_MINUTES=${LOSS_COOLDOWN_MINUTES:-15}
      - DRAWDOWN_PAUSE_PCT=${DRAWDOWN_PAUSE_PCT:--10.0}
      - MAX_COIN_REPEATS_PER_HOUR=${MAX_COIN_REPEATS_PER_HOUR:-2}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - bot-network
    depends_on:
      postgres:
        condition: service_healthy

  # ── Position Manager Bot (24/7 exit engine) ──────────────────────────
  position-manager:
    build: .
    container_name: position-manager
    # WORKDIR is /app, file is copied to /app/position_manager.py
    command: [ "python", "/app/position_manager.py" ]
    environment:
      # Database
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Binance (master account — CloseEngine also reads per-account creds from DB)
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - BINANCE_TESTNET=${BINANCE_TESTNET:-true}
      # Encryption (needed to decrypt per-account API keys)
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Telegram (for close notifications)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Risk settings (used for trailing trigger)
      - BREAK_EVEN_ENABLED=${BREAK_EVEN_ENABLED:-true}
      - BREAK_EVEN_TRIGGER_PCT=${BREAK_EVEN_TRIGGER_PCT:-3.0}
      - BREAK_EVEN_BUFFER_PCT=${BREAK_EVEN_BUFFER_PCT:-0.1}
      # V12: Binance as truth source
      - BINANCE_TRUTH_SOURCE=${BINANCE_TRUTH_SOURCE:-true}
      - BINANCE_SYNC_INTERVAL=${BINANCE_SYNC_INTERVAL:-60}
      - BINANCE_GHOST_CLOSE_REASON=${BINANCE_GHOST_CLOSE_REASON:-externally_closed}
      - BINANCE_CREATE_MISSING_RECORDS=${BINANCE_CREATE_MISSING_RECORDS:-true}
      # V12: Position limits (99999 = unlimited — Binance live is the gate)
      - MAX_OPEN_POSITIONS=${MAX_OPEN_POSITIONS:-99999}
      - MAX_CONCURRENT_SCALP_TRADES=${MAX_CONCURRENT_SCALP_TRADES:-99999}
      - MAX_CONCURRENT_SWING_TRADES=${MAX_CONCURRENT_SWING_TRADES:-99999}
      - MAX_SAME_SYMBOL_OPEN=${MAX_SAME_SYMBOL_OPEN:-1}
      # V11: Stale detection
      - STALE_CLOSE_ENABLED=${STALE_CLOSE_ENABLED:-false}
      - SCALP_STALE_HOURS=${SCALP_STALE_HOURS:-4}
      - SWING_STALE_HOURS=${SWING_STALE_HOURS:-72}
      # V11: PM reliability
      - PM_CANDLE_CHECK_TICKS=${PM_CANDLE_CHECK_TICKS:-30}
      - PM_MAX_CLOSE_RETRIES=${PM_MAX_CLOSE_RETRIES:-3}
      - PM_CLOSE_RETRY_DELAY=${PM_CLOSE_RETRY_DELAY:-5}
      - PM_ORPHAN_SYNC_ENABLED=${PM_ORPHAN_SYNC_ENABLED:-true}
      - PYTHON_PM_ENABLED=${PYTHON_PM_ENABLED:-true}
    volumes:
      - ./logs:/app/logs
    # ALWAYS restart — this must never go down
    restart: always
    networks:
      - bot-network
    depends_on:
      postgres:
        condition: service_healthy
      trading-bot:
        condition: service_started
    # ── Healthcheck: process-based (not HTTP — this is a loop script, not a server)
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f position_manager.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # ── n8n Workflow Automation ──────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - NN8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL}
      - GENERIC_TIMEZONE=UTC
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - bot-network
    depends_on:
      - trading-bot

volumes:
  postgres_data:
  n8n_data:

networks:
  bot-network:
    driver: bridge
